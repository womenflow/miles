<svg viewBox="0 0 720 430" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" role="img" aria-label="Five rules for running safely in hot weather">
  <rect x="0" y="0" width="720" height="430" fill="#ffffff"/>
  <text x="36" y="42" font-size="24" font-weight="700" fill="#1a1a1a">Hot-Weather Running: 5 Rules</text>
  <text x="36" y="65" font-size="14" fill="#6b7280">Run smarter, not tougher, when it's 90°F</text>
  <g>
    <rect x="36" y="88" width="330" height="72" rx="10" fill="#f2f8f4" stroke="#d7e6dc"/>
    <circle cx="66" cy="124" r="15" fill="#1f6f43"/><text x="66" y="129" font-size="14" font-weight="700" fill="#fff" text-anchor="middle">1</text>
    <text x="90" y="118" font-size="15" font-weight="700" fill="#1a1a1a">Time it right</text>
    <text x="90" y="138" font-size="12.5" fill="#4b5563">Early morning or after sunset</text>
    <rect x="378" y="88" width="306" height="72" rx="10" fill="#f2f8f4" stroke="#d7e6dc"/>
    <circle cx="408" cy="124" r="15" fill="#1f6f43"/><text x="408" y="129" font-size="14" font-weight="700" fill="#fff" text-anchor="middle">2</text>
    <text x="432" y="118" font-size="15" font-weight="700" fill="#1a1a1a">Hydrate early</text>
    <text x="432" y="138" font-size="12.5" fill="#4b5563">Before thirst · add electrolytes</text>
    <rect x="36" y="172" width="330" height="72" rx="10" fill="#f2f8f4" stroke="#d7e6dc"/>
    <circle cx="66" cy="208" r="15" fill="#1f6f43"/><text x="66" y="213" font-size="14" font-weight="700" fill="#fff" text-anchor="middle">3</text>
    <text x="90" y="202" font-size="15" font-weight="700" fill="#1a1a1a">Dress light</text>
    <text x="90" y="222" font-size="12.5" fill="#4b5563">Loose, pale, moisture-wicking</text>
    <rect x="378" y="172" width="306" height="72" rx="10" fill="#f2f8f4" stroke="#d7e6dc"/>
    <circle cx="408" cy="208" r="15" fill="#1f6f43"/><text x="408" y="213" font-size="14" font-weight="700" fill="#fff" text-anchor="middle">4</text>
    <text x="432" y="202" font-size="15" font-weight="700" fill="#1a1a1a">Slow down</text>
    <text x="432" y="222" font-size="12.5" fill="#4b5563">Run by effort, drop the ego</text>
    <rect x="36" y="256" width="648" height="72" rx="10" fill="#f2f8f4" stroke="#d7e6dc"/>
    <circle cx="66" cy="292" r="15" fill="#1f6f43"/><text x="66" y="297" font-size="14" font-weight="700" fill="#fff" text-anchor="middle">5</text>
    <text x="90" y="286" font-size="15" font-weight="700" fill="#1a1a1a">Seek shade</text>
    <text x="90" y="306" font-size="12.5" fill="#4b5563">Tree-lined trails feel 10–15° cooler and are kinder on your legs</text>
  </g>
  <rect x="36" y="344" width="648" height="58" rx="10" fill="#fdecea" stroke="#f5c6bf"/>
  <text x="56" y="368" font-size="14" font-weight="700" fill="#c0392b">⚠ Stop immediately if you feel:</text>
  <text x="56" y="388" font-size="12.5" fill="#a53125">dizzy · nauseous · chills · or you stop sweating — get to shade and hydrate</text>
</svg>